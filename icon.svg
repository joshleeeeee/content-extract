<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Minimalist dark gradient base -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Vibrant Blue Extract Gradient -->
    <linearGradient id="extractGradient" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- Deep Drop Shadow for floating effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="-2" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- App Icon Dark Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- ======================== -->
  <!-- LAYER 1: BROWSER FRAME   -->
  <!-- ======================== -->
  <g>
    <!-- Abstract Generic Web Page - EXTREME LARGE -->
    <rect x="6" y="20" width="70" height="74" rx="8" fill="#0F172A" stroke="#334155" stroke-width="2.5"/>
    
    <!-- Title bar dots -->
    <circle cx="18" cy="30" r="3" fill="#475569"/>
    <circle cx="28" cy="30" r="3" fill="#475569"/>
    <circle cx="38" cy="30" r="3" fill="#475569"/>
    
    <!-- Title bar separator -->
    <line x1="6" y1="40" x2="76" y2="40" stroke="#334155" stroke-width="2.5"/>

    <!-- Placeholder skeleton content -->
    <rect x="18" y="52" width="16" height="16" rx="4" fill="#1E293B"/>
    <rect x="42" y="54" width="24" height="5" rx="2.5" fill="#1E293B"/>
    <rect x="42" y="63" width="18" height="5" rx="2.5" fill="#1E293B"/>
    
    <rect x="18" y="78" width="48" height="5" rx="2.5" fill="#1E293B"/>
    <rect x="18" y="87" width="36" height="5" rx="2.5" fill="#1E293B"/>
  </g>

  <!-- ======================== -->
  <!-- LAYER 2: EXTRACTED DOC   -->
  <!-- ======================== -->
  <g filter="url(#glow)">
    <!-- Abstract Clean Exported Document - STANDS OUT HUGE -->
    <rect x="34" y="6" width="60" height="74" rx="8" fill="url(#extractGradient)" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>
    
    <!-- Document Text Lines -->
    <rect x="48" y="22" width="22" height="6" rx="3" fill="#FFFFFF"/>
    <rect x="48" y="36" width="32" height="6" rx="3" fill="#E0F2FE"/>
    <rect x="48" y="48" width="26" height="6" rx="3" fill="#BAE6FD"/>
    <rect x="48" y="60" width="16" height="6" rx="3" fill="#7DD3FC"/>
  </g>

  <!-- ======================== -->
  <!-- LAYER 3: MAGIC SPARKLES  -->
  <!-- ======================== -->
  <g opacity="0.9">
    <!-- Star top right -->
    <path d="M 90 8 L 91 11 L 94 12 L 91 13 L 90 16 L 89 13 L 86 12 L 89 11 Z" fill="#38BDF8"/>
    <!-- Star middle left -->
    <path d="M 18 10 L 18.5 12.5 L 21 13 L 18.5 13.5 L 18 16 L 17.5 13.5 L 15 13 L 17.5 12.5 Z" fill="#64748B"/>
  </g>
</svg>